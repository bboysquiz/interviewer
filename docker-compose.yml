services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - server/.env
    environment:
      PORT: 3000
      DATABASE_PATH: /app/server/data/app.db
      UPLOADS_DIR: /app/server/uploads
    volumes:
      - ./server/data:/app/server/data
      - ./server/uploads:/app/server/uploads
    expose:
      - '3000'

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
